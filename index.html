<!DOCTYPE html>
<html>
<head>
  <title>Bank System - Firebase</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; display:flex; background:#f4f6f9;}
    .sidebar { width:220px; background:#1e293b; color:white; padding:20px;}
    .main { flex:1; padding:20px;}
    .card { padding:20px; border-radius:10px; color:white; margin:10px;}
    .green {background:#22c55e;} .blue {background:#3b82f6;} .red {background:#ef4444;}
    .section { background:white; padding:20px; border-radius:10px; margin-top:20px;}
    table { width:100%; border-collapse:collapse;}
    th,td { padding:10px; border-bottom:1px solid #ddd;}
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" style="margin:auto; text-align:center;">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none; width:100%; display:flex;">

  <div class="sidebar">
    <h2>🏦 Bank</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <h2>Dashboard</h2>

    <input id="name" placeholder="Name">
    <button onclick="createAccount()">Create Account</button>

    <br><br>

    <input id="acc" placeholder="Account No">
    <input id="amt" placeholder="Amount">

    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>

    <div class="section">
      <h3>Transactions</h3>
      <table id="table">
        <tr><th>Acc</th><th>Type</th><th>Amount</th></tr>
      </table>
    </div>

    <canvas id="chart"></canvas>

  </div>

</div>

<script>

// 🔥 YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 LOGIN
function login(){
  firebase.auth().signInWithEmailAndPassword(email.value, password.value)
  .then(()=>{
    loginPage.style.display="none";
    app.style.display="flex";
    loadData();
  })
  .catch(e=>alert(e.message));
}

// 🚪 LOGOUT
function logout(){
  firebase.auth().signOut();
  location.reload();
}

// 🏦 CREATE ACCOUNT
function createAccount(){
  let accNo = "ACC"+Date.now();

  db.collection("accounts").doc(accNo).set({
    name: name.value,
    balance:0
  });

  alert("Created: "+accNo);
}

// 💰 DEPOSIT
function deposit(){
  let ref = db.collection("accounts").doc(acc.value);

  ref.get().then(doc=>{
    let data = doc.data();

    let newBal = data.balance + parseInt(amt.value);

    ref.update({ balance:newBal });

    db.collection("transactions").add({
      acc:acc.value,
      type:"deposit",
      amount:parseInt(amt.value),
      date:new Date().toLocaleString()
    });

    loadData();
  });
}

// 💸 WITHDRAW
function withdraw(){
  let ref = db.collection("accounts").doc(acc.value);

  ref.get().then(doc=>{
    let data = doc.data();

    if(data.balance < amt.value) return alert("Insufficient");

    let newBal = data.balance - parseInt(amt.value);

    ref.update({ balance:newBal });

    db.collection("transactions").add({
      acc:acc.value,
      type:"withdraw",
      amount:parseInt(amt.value),
      date:new Date().toLocaleString()
    });

    loadData();
  });
}

// 📊 LOAD DATA
function loadData(){
  let table = document.getElementById("table");
  table.innerHTML = "<tr><th>Acc</th><th>Type</th><th>Amount</th></tr>";

  let dep=0, wit=0;

  db.collection("transactions").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let t = doc.data();

      table.innerHTML += `<tr>
        <td>${t.acc}</td>
        <td>${t.type}</td>
        <td>${t.amount}</td>
      </tr>`;

      if(t.type=="deposit") dep+=t.amount;
      else wit+=t.amount;
    });

    drawChart(dep,wit);
  });
}

// 📈 GRAPH
function drawChart(dep,wit){
  new Chart(chart,{
    type:"bar",
    data:{
      labels:["Deposit","Withdraw"],
      datasets:[{data:[dep,wit]}]
    }
  });
}

</script>

</body>
</html>
