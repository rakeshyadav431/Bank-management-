<!DOCTYPE html>
<html>
<head>
  <title>Topper Bank System</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <!-- Charts + PDF -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { margin:0; font-family: Arial; display:flex; }
    .sidebar { width:220px; background:#111; color:white; padding:10px; height:100vh; }
    .sidebar button { width:100%; padding:10px; margin:5px 0; background:#222; color:white; border:none; }
    .main { flex:1; padding:20px; background:#f4f6f8; }
    .card { background:white; padding:20px; border-radius:10px; width:400px; margin-bottom:20px; }
    input { width:100%; padding:10px; margin:5px 0; }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>🏦 Bank</h3>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('create')">Create Account</button>
  <button onclick="show('deposit')">Deposit</button>
  <button onclick="show('withdraw')">Withdraw</button>
  <button onclick="show('transactions')">Transactions</button>
  <button onclick="show('graph')">Analytics</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- LOGIN -->
<div id="login" class="card">
  <h3>Employee Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card" style="display:none">
  <h3>Dashboard</h3>
  <p id="welcome"></p>
</div>

<!-- CREATE -->
<div id="create" class="card" style="display:none">
  <h3>Create Account</h3>
  <input id="name" placeholder="Name">
  <button onclick="createAccount()">Create</button>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="card" style="display:none">
  <input id="d_acc" placeholder="Account No">
  <input id="d_amt" placeholder="Amount">
  <button onclick="deposit()">Deposit</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="card" style="display:none">
  <input id="w_acc" placeholder="Account No">
  <input id="w_amt" placeholder="Amount">
  <button onclick="withdraw()">Withdraw</button>
</div>

<!-- TRANSACTIONS -->
<div id="transactions" class="card" style="display:none">
  <input id="t_acc" placeholder="Account No">
  <button onclick="loadTransactions()">Load</button>
  <div id="t_data"></div>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- GRAPH -->
<div id="graph" class="card" style="display:none">
  <canvas id="chart"></canvas>
</div>

</div>

<script>
// 🔥 ADD YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN
function login(){
  firebase.auth().signInWithEmailAndPassword(
    email.value, password.value
  ).then(user=>{
    document.getElementById("login").style.display="none";
    show('dashboard');
    welcome.innerText = "Welcome " + user.user.email;
  }).catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
  firebase.auth().signOut();
  location.reload();
}

// CREATE ACCOUNT
function createAccount(){
  let acc = "ACC"+Math.floor(Math.random()*100000);
  db.collection("accounts").doc(acc).set({
    name:name.value,
    balance:0,
    transactions:[]
  });
  alert("Created "+acc);
}

// DEPOSIT
function deposit(){
  let ref = db.collection("accounts").doc(d_acc.value);
  ref.get().then(doc=>{
    let d = doc.data();
    d.balance += parseInt(d_amt.value);
    d.transactions.push("Deposit ₹"+d_amt.value);
    ref.set(d);
  });
}

// WITHDRAW
function withdraw(){
  let ref = db.collection("accounts").doc(w_acc.value);
  ref.get().then(doc=>{
    let d = doc.data();
    if(d.balance < w_amt.value) return alert("Insufficient");
    d.balance -= parseInt(w_amt.value);
    d.transactions.push("Withdraw ₹"+w_amt.value);
    ref.set(d);
  });
}

// TRANSACTIONS
function loadTransactions(){
  db.collection("accounts").doc(t_acc.value).get().then(doc=>{
    let t = doc.data().transactions;
    t_data.innerHTML = t.map(x=>`<p>${x}</p>`).join("");
    drawGraph(t);
  });
}

// GRAPH
function drawGraph(t){
  let dep = t.filter(x=>x.includes("Deposit")).length;
  let wit = t.filter(x=>x.includes("Withdraw")).length;

  new Chart(chart,{
    type:"pie",
    data:{
      labels:["Deposit","Withdraw"],
      datasets:[{data:[dep,wit]}]
    }
  });
}

// PDF
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  doc.text(t_data.innerText,10,10);
  doc.save("passbook.pdf");
}

// UI
function show(id){
  document.querySelectorAll(".card").forEach(c=>c.style.display="none");
  document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
