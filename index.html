<!DOCTYPE html>
<html>
<head>
  <title>Bank Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      display:flex;
      background:#f4f6f9;
    }

    /* SIDEBAR */
    .sidebar {
      width:220px;
      background:#1e293b;
      color:white;
      height:100vh;
      padding:20px;
    }

    .sidebar h2 {
      margin-bottom:20px;
    }

    .menu button {
      width:100%;
      padding:12px;
      margin:5px 0;
      border:none;
      background:#334155;
      color:white;
      cursor:pointer;
      text-align:left;
    }

    .menu button.active {
      background:#0ea5e9;
    }

    /* MAIN */
    .main {
      flex:1;
      padding:20px;
    }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .cards {
      display:flex;
      gap:20px;
      margin:20px 0;
    }

    .card {
      flex:1;
      padding:20px;
      border-radius:10px;
      color:white;
    }

    .green { background:#22c55e; }
    .blue { background:#3b82f6; }
    .red { background:#ef4444; }

    .section {
      background:white;
      padding:20px;
      border-radius:10px;
      margin-top:20px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    .btn {
      padding:8px 12px;
      background:#3b82f6;
      color:white;
      border:none;
      cursor:pointer;
    }

    .badge-dep { background:green; color:white; padding:5px 10px; border-radius:5px; }
    .badge-wit { background:red; color:white; padding:5px 10px; border-radius:5px; }

    .flex {
      display:flex;
      gap:20px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🏦 Bank</h2>
  <div class="menu">
    <button class="active">Dashboard</button>
    <button>Create Account</button>
    <button>Deposit</button>
    <button>Withdraw</button>
    <button>Transactions</button>
    <button>Analytics</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="top">
    <h2>Welcome admin 👨‍💼</h2>
    <button class="btn">Download Passbook</button>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card green">
      <h3>Total Accounts</h3>
      <h2 id="totalAcc">3</h2>
    </div>

    <div class="card blue">
      <h3>Total Deposits</h3>
      <h2 id="totalDep">₹ 1000</h2>
    </div>

    <div class="card red">
      <h3>Total Withdrawals</h3>
      <h2 id="totalWit">₹ 6000</h2>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="section">
    <h3>Search Account</h3>
    <input id="searchAcc" placeholder="Enter Account Number">
    <button class="btn" onclick="searchAccount()">Search</button>
  </div>

  <!-- TABLE + GRAPH -->
  <div class="flex">

    <div class="section" style="flex:2">
      <h3>Recent Transactions</h3>
      <table id="table">
        <tr>
          <th>Account</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Date</th>
        </tr>
      </table>
    </div>

    <div class="section" style="flex:1">
      <h3>Analytics</h3>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script>

// DEMO DATA
let transactions = [
  {acc:"ACC12345", type:"deposit", amount:5000, date:"April 29"},
  {acc:"ACC67890", type:"withdraw", amount:6000, date:"April 28"},
  {acc:"ACC12345", type:"deposit", amount:6000, date:"April 27"}
];

// LOAD TABLE
function loadTable(){
  let table = document.getElementById("table");

  transactions.forEach(t=>{
    let row = `
      <tr>
        <td>${t.acc}</td>
        <td>${t.type=="deposit" ? "<span class='badge-dep'>Deposit</span>" : "<span class='badge-wit'>Withdraw</span>"}</td>
        <td>₹ ${t.amount}</td>
        <td>${t.date}</td>
      </tr>
    `;
    table.innerHTML += row;
  });
}

// GRAPH
function loadGraph(){
  let dep = transactions.filter(t=>t.type=="deposit").length;
  let wit = transactions.filter(t=>t.type=="withdraw").length;

  new Chart(chart,{
    type:"bar",
    data:{
      labels:["Deposits","Withdraw"],
      datasets:[{ data:[dep,wit] }]
    }
  });
}

// SEARCH
function searchAccount(){
  let acc = searchAcc.value;
  alert("Searching for " + acc);
}

// LOGOUT
function logout(){
  alert("Logged out");
}

// INIT
loadTable();
loadGraph();

</script>

</body>
</html>
